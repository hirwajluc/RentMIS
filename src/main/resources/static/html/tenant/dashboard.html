<!doctype html>
<html lang="en" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
      data-skin="default" data-bs-theme="light" data-assets-path="/assets/" data-template="vertical-menu-template-no-customizer">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title id="page-title">My Dashboard — RentMIS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg"/><link rel="alternate icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/vendor/fonts/iconify-icons.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/node-waves/node-waves.css"/>
  <link rel="stylesheet" href="/assets/vendor/css/core.css"/>
  <link rel="stylesheet" href="/assets/css/demo.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css"/>
  <script src="/assets/vendor/js/helpers.js"></script>
  <script src="/assets/js/config.js"></script>
  <style>
    /* ── Contract/Unit slider ── */
    .unit-slider-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 0.5rem;
    }
    .unit-slider-track {
      display: flex;
      transition: transform .3s ease;
    }
    .unit-slide {
      min-width: 100%;
      box-sizing: border-box;
    }
    .unit-slide .card { margin-bottom: 0; }

    .slider-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .slider-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid #696cff;
      background: #fff;
      color: #696cff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      transition: all .15s;
      flex-shrink: 0;
    }
    .slider-btn:hover { background: #696cff; color: #fff; }
    .slider-btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
    .slider-dots { display: flex; gap: 6px; align-items: center; }
    .slider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d0d0e0;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .slider-dot.active { background: #696cff; transform: scale(1.25); }
    .slider-counter { font-size: .78rem; color: #888; min-width: 40px; text-align: center; }
  </style>
</head>
<body>
<div class="layout-wrapper layout-content-navbar">
  <div class="layout-container">
    <div id="rentmis-sidebar"></div>
    <div class="layout-page">
      <div id="rentmis-navbar"></div>
      <div class="content-wrapper">
        <div class="container-xxl flex-grow-1 container-p-y">

          <div class="mb-6">
            <h4 class="mb-1" id="welcomeMsg">Welcome back!</h4>
            <p class="text-muted mb-0">Here's an overview of your tenancy.</p>
          </div>

          <div class="row g-4 mb-6">

            <!-- Unit + Contract slider (takes 2 of 3 columns) -->
            <div class="col-md-8 col-xl-8" id="sliderCol">
              <!-- spinner while loading -->
              <div id="sliderLoading" class="card" style="min-height:200px">
                <div class="card-body d-flex align-items-center justify-content-center">
                  <div class="spinner-border text-primary"></div>
                </div>
              </div>

              <!-- slider (injected by JS) -->
              <div id="sliderRoot" style="display:none"></div>
            </div>

            <!-- Quick pay -->
            <div class="col-md-4 col-xl-4">
              <div class="card h-100 bg-primary text-white">
                <div class="card-body d-flex flex-column justify-content-between">
                  <div>
                    <div class="avatar avatar-lg mb-4">
                      <span class="avatar-initial rounded-3 bg-white text-primary"><i class="ti tabler-credit-card fs-4"></i></span>
                    </div>
                    <h5 class="text-white mb-2">Pay Rent</h5>
                    <p class="mb-0 opacity-75">Make your monthly rent payment securely via GLSPay.</p>
                  </div>
                  <a href="/html/tenant/payments.html" class="btn btn-white btn-sm mt-4">Pay Now →</a>
                </div>
              </div>
            </div>
          </div>

          <!-- Recent Payments -->
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0">Recent Payments</h5>
              <a href="/html/tenant/history.html" class="btn btn-sm btn-outline-primary">View All</a>
            </div>
            <div class="table-responsive">
              <table class="table table-sm">
                <thead><tr><th>Reference</th><th>Period</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="recentPayments">
                  <tr><td colspan="5" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
        <footer class="content-footer footer bg-footer-theme">
          <div class="container-xxl">
            <div class="footer-container d-flex align-items-center justify-content-center py-3">
              <p class="footer-text mb-0 text-muted small">Copyright &copy; <span class="footer-year"></span> <strong>Good Link Solutions</strong>. All rights reserved.</p>
            </div>
          </div>
        </footer>
        <div class="content-backdrop fade"></div>
      </div>
    </div>
  </div>
  <div class="layout-overlay layout-menu-toggle"></div>
</div>
<script src="/assets/vendor/libs/jquery/jquery.js"></script>
<script src="/assets/vendor/libs/popper/popper.js"></script>
<script src="/assets/vendor/js/bootstrap.js"></script>
<script src="/assets/vendor/libs/node-waves/node-waves.js"></script>
<script src="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
<script src="/assets/vendor/js/menu.js"></script>
<script src="/assets/js/main.js"></script>
  <script src="/static/js/i18n.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
const months     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const statusColor = { COMPLETED:'success', PENDING:'warning', PROCESSING:'info',
                      PENDING_CONFIRMATION:'primary', FAILED:'danger', CANCELLED:'secondary' };

// ── Slider state ─────────────────────────────────────────────────────────────
let sliderContracts = [];
let sliderIdx = 0;

function buildSlide(c) {
  const u = c.unit || {};
  const rent = parseFloat(c.monthlyRent) || parseFloat(u.rentAmount) || 0;
  const start = c.startDate ? new Date(c.startDate).toLocaleDateString() : '–';
  const end   = c.endDate   ? new Date(c.endDate).toLocaleDateString()   : '–';
  return `
  <div class="unit-slide">
    <div class="card mb-0">
      <div class="card-body">
        <!-- Unit header -->
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="avatar avatar-lg">
            <span class="avatar-initial rounded-3 bg-label-primary"><i class="ti tabler-door fs-4"></i></span>
          </div>
          <div class="flex-grow-1">
            <h5 class="mb-0">${u.unitNumber || '–'}</h5>
            <small class="text-muted">${u.propertyName || '–'}</small>
          </div>
          <div class="text-end">
            <div class="fs-5 fw-bold text-primary">RWF ${rent.toLocaleString()}</div>
            <small class="text-muted">/ month</small>
          </div>
        </div>

        <!-- Unit details -->
        <div class="row g-2 mb-3">
          <div class="col-4 text-center">
            <div class="border rounded-2 py-2">
              <i class="ti tabler-stairs text-muted d-block mb-1"></i>
              <div class="small fw-semibold">${u.floorNumber != null ? 'Floor ' + u.floorNumber : '–'}</div>
            </div>
          </div>
          <div class="col-4 text-center">
            <div class="border rounded-2 py-2">
              <i class="ti tabler-bed text-muted d-block mb-1"></i>
              <div class="small fw-semibold">${u.numBedrooms != null ? u.numBedrooms + ' Bed' : '–'}</div>
            </div>
          </div>
          <div class="col-4 text-center">
            <div class="border rounded-2 py-2">
              <i class="ti tabler-bath text-muted d-block mb-1"></i>
              <div class="small fw-semibold">${u.numBathrooms != null ? u.numBathrooms + ' Bath' : '–'}</div>
            </div>
          </div>
        </div>

        <!-- Contract info -->
        <div class="border-top pt-3">
          <div class="d-flex align-items-center gap-2 mb-2">
            <i class="ti tabler-file-certificate text-success"></i>
            <span class="fw-semibold small">${c.contractNumber || 'Contract'}</span>
            <span class="badge bg-label-success ms-auto">${c.status || 'ACTIVE'}</span>
          </div>
          <div class="d-flex justify-content-between small text-muted">
            <span>From <strong class="text-body">${start}</strong></span>
            <span>To <strong class="text-body">${end}</strong></span>
          </div>
        </div>
      </div>
      <div class="card-footer py-2 d-flex gap-2 justify-content-center">
        <a href="/html/tenant/my-unit.html"     class="btn btn-sm btn-outline-primary">View Unit</a>
        <a href="/html/tenant/contracts.html"   class="btn btn-sm btn-outline-success">View Contract</a>
      </div>
    </div>
  </div>`;
}

function renderSlider(contracts) {
  sliderContracts = contracts;
  sliderIdx = 0;

  const root = document.getElementById('sliderRoot');

  if (contracts.length === 1) {
    // Single contract — no navigation chrome needed
    root.innerHTML = buildSlide(contracts[0]);
    root.style.display = '';
    return;
  }

  // Multiple contracts — build slider with nav
  const slidesHtml = contracts.map(c => buildSlide(c)).join('');
  const dotsHtml = contracts.map((_, i) =>
    `<span class="slider-dot${i === 0 ? ' active' : ''}" onclick="goToSlide(${i})"></span>`
  ).join('');

  root.innerHTML = `
    <div class="unit-slider-wrap">
      <div class="unit-slider-track" id="sliderTrack">${slidesHtml}</div>
    </div>
    <div class="slider-nav">
      <button class="slider-btn" id="sliderPrev" onclick="slideStep(-1)" disabled title="Previous">
        <i class="ti tabler-chevron-left"></i>
      </button>
      <div class="slider-dots" id="sliderDots">${dotsHtml}</div>
      <span class="slider-counter" id="sliderCounter">1 / ${contracts.length}</span>
      <button class="slider-btn" id="sliderNext" onclick="slideStep(1)" title="Next">
        <i class="ti tabler-chevron-right"></i>
      </button>
    </div>`;

  root.style.display = '';
}

function goToSlide(idx) {
  sliderIdx = idx;
  const total = sliderContracts.length;
  document.getElementById('sliderTrack').style.transform = `translateX(-${idx * 100}%)`;
  document.getElementById('sliderCounter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('sliderPrev').disabled = idx === 0;
  document.getElementById('sliderNext').disabled = idx === total - 1;
  document.querySelectorAll('.slider-dot').forEach((d, i) =>
    d.classList.toggle('active', i === idx));
}

function slideStep(dir) {
  goToSlide(sliderIdx + dir);
}

// ── Main init ─────────────────────────────────────────────────────────────────
(async () => {
  const user = Auth.getUser();
  document.getElementById('welcomeMsg').textContent =
    `Welcome back, ${user.fullName || user.firstName || user.full_name || 'Tenant'}!`;

  // Load all active contracts (carries unit details inside)
  const contRes = await API.getContracts({ status: 'ACTIVE', size: 50 });
  document.getElementById('sliderLoading').style.display = 'none';

  if (contRes?.ok && contRes.data.data?.content?.length) {
    renderSlider(contRes.data.data.content);
  } else {
    document.getElementById('sliderRoot').innerHTML = `
      <div class="card">
        <div class="card-body text-center py-5">
          <i class="ti tabler-home-off fs-1 text-muted mb-3 d-block"></i>
          <p class="text-muted mb-0">No active contract found for your account.</p>
        </div>
      </div>`;
    document.getElementById('sliderRoot').style.display = '';
  }

  // Recent payments
  const payRes = await API.getPayments({ size: 5 });
  const body = document.getElementById('recentPayments');
  if (!payRes?.ok || !payRes.data.data?.content?.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">No payments yet</td></tr>';
    return;
  }
  body.innerHTML = payRes.data.data.content.map(p => `
    <tr>
      <td><code class="small">${p.referenceNumber}</code></td>
      <td>${p.paymentPeriodMonth ? months[p.paymentPeriodMonth-1]+' '+p.paymentPeriodYear : '–'}</td>
      <td>RWF ${(p.totalAmount||0).toLocaleString()}</td>
      <td><span class="badge bg-label-${statusColor[p.status]||'secondary'}">${p.status.replace(/_/g,' ')}</span></td>
      <td>${p.paidAt ? new Date(p.paidAt).toLocaleDateString() : new Date(p.createdAt).toLocaleDateString()}</td>
    </tr>`).join('');
})();
</script>
<script>document.querySelectorAll('.footer-year').forEach(function(el){el.textContent=new Date().getFullYear();});</script>
</body>
</html>
