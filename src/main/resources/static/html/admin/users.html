<!doctype html>
<html lang="en" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
      data-skin="default" data-bs-theme="light" data-assets-path="/assets/" data-template="vertical-menu-template-no-customizer">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title id="page-title">Users — RentMIS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg"/><link rel="alternate icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/vendor/fonts/iconify-icons.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/node-waves/node-waves.css"/>
  <link rel="stylesheet" href="/assets/vendor/css/core.css"/>
  <link rel="stylesheet" href="/assets/css/demo.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css"/>
  <script src="/assets/vendor/js/helpers.js"></script>
  <script src="/assets/js/config.js"></script>
</head>
<body>
<div class="layout-wrapper layout-content-navbar">
  <div class="layout-container">
    <div id="rentmis-sidebar"></div>
    <div class="layout-page">
      <div id="rentmis-navbar"></div>
      <div class="content-wrapper">
        <div class="container-xxl flex-grow-1 container-p-y">
          <div class="d-flex align-items-center justify-content-between mb-6">
            <div><h4 class="mb-1">All Users</h4><p class="text-muted mb-0">Manage system users</p></div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createUserModal">
              <i class="ti tabler-user-plus me-1"></i>Add User
            </button>
          </div>

          <div class="card">
            <div class="card-header d-flex align-items-center gap-3 flex-wrap">
              <div class="input-group flex-grow-0" style="max-width:260px">
                <span class="input-group-text"><i class="ti tabler-search"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Search…"/>
              </div>
              <select class="form-select form-select-sm" id="roleFilter" style="width:140px">
                <option value="">All Roles</option>
                <option value="ADMIN">Admin</option>
                <option value="LANDLORD">Landlord</option>
                <option value="TENANT">Tenant</option>
                <option value="AGENT">Agent</option>
              </select>
            </div>
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                </thead>
                <tbody id="usersBody">
                  <tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                </tbody>
              </table>
            </div>
            <div class="card-footer d-flex justify-content-between align-items-center">
              <small class="text-muted" id="tableInfo"></small>
              <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
            </div>
          </div>
        </div>
        <footer class="content-footer footer bg-footer-theme">
          <div class="container-xxl">
            <div class="footer-container d-flex align-items-center justify-content-center py-3">
              <p class="footer-text mb-0 text-muted small">Copyright &copy; <span class="footer-year"></span> <strong>Good Link Solutions</strong>. All rights reserved.</p>
            </div>
          </div>
        </footer>
        <div class="content-backdrop fade"></div>
      </div>
    </div>
  </div>
  <div class="layout-overlay layout-menu-toggle"></div>
</div>

<!-- Create User Modal -->
<div class="modal fade" id="createUserModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add New User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="userFormMsg" class="d-none mb-3"></div>
        <form id="createUserForm">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">First Name *</label>
              <input type="text" class="form-control" id="uFirstName" required/>
            </div>
            <div class="col-6">
              <label class="form-label">Last Name *</label>
              <input type="text" class="form-control" id="uLastName" required/>
            </div>
            <div class="col-12">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" id="uEmail" required/>
            </div>
            <div class="col-12">
              <label class="form-label">National ID</label>
              <div class="input-group">
                <input type="text" class="form-control" id="uNationalId" placeholder="16-digit NID" maxlength="19"/>
                <span class="input-group-text" id="uNidSpinner" style="display:none"><span class="spinner-border spinner-border-sm"></span></span>
                <span class="input-group-text text-success d-none" id="uNidOk"><i class="ti tabler-check"></i></span>
              </div>
              <small id="uNidMsg" class="text-muted"></small>
            </div>
            <div class="col-12">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="uPhone"/>
            </div>
            <div class="col-12">
              <label class="form-label">Role *</label>
              <select class="form-select" id="uRole" required>
                <option value="TENANT">Tenant</option>
                <option value="LANDLORD">Landlord</option>
                <option value="AGENT">Agent / Broker</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Password *</label>
              <input type="password" class="form-control" id="uPassword" required placeholder="Min 8 characters"/>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="createUser()">
          <span id="createBtnText">Create User</span>
          <span id="createSpinner" class="spinner-border spinner-border-sm d-none ms-1"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/assets/vendor/libs/jquery/jquery.js"></script>
<script src="/assets/vendor/libs/popper/popper.js"></script>
<script src="/assets/vendor/js/bootstrap.js"></script>
<script src="/assets/vendor/libs/node-waves/node-waves.js"></script>
<script src="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
<script src="/assets/vendor/js/menu.js"></script>
<script src="/assets/js/main.js"></script>
  <script src="/static/js/i18n.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
let page = 0, searchTimer;
const roleColor = { ADMIN:'danger', LANDLORD:'info', TENANT:'primary', AGENT:'warning' };
const createModal = new bootstrap.Modal(document.getElementById('createUserModal'));

async function load() {
  const q = document.getElementById('searchInput').value;
  const role = document.getElementById('roleFilter').value;
  const params = { page, size: 20 };
  if (q) params.search = q;
  if (role) params.role = role;

  const res = await API.getUsers(params);
  const body = document.getElementById('usersBody');

  if (!res || !res.ok || !res.data.data || !res.data.data.content.length) {
    body.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No users found</td></tr>';
    return;
  }
  const p = res.data.data;
  body.innerHTML = p.content.map(u => `
    <tr>
      <td>
        <div class="d-flex align-items-center gap-2">
          <div class="avatar avatar-sm"><span class="avatar-initial rounded-circle bg-label-${roleColor[u.role]||'secondary'}">${(u.firstName||'?')[0].toUpperCase()}</span></div>
          <div>${u.firstName} ${u.lastName}</div>
        </div>
      </td>
      <td>${u.email}</td>
      <td>${u.phone || '–'}</td>
      <td><span class="badge bg-label-${roleColor[u.role]||'secondary'}">${u.role}</span></td>
      <td><span class="badge bg-label-${u.isActive?'success':'danger'}">${u.isActive?'Active':'Inactive'}</span></td>
      <td>${new Date(u.createdAt).toLocaleDateString()}</td>
      <td>
        <button class="btn btn-sm btn-icon btn-outline-${u.isActive?'danger':'success'}" onclick="toggleActive(${u.id})" title="${u.isActive?'Deactivate':'Activate'}">
          <i class="ti ${u.isActive?'tabler-user-off':'tabler-user-check'}"></i>
        </button>
      </td>
    </tr>`).join('');

  document.getElementById('tableInfo').textContent = `${p.totalElements} users`;
  document.getElementById('pagination').innerHTML = Array.from({length: p.totalPages}, (_, i) =>
    `<li class="page-item${i===p.number?' active':''}"><a class="page-link" onclick="gotoPage(${i})">${i+1}</a></li>`
  ).join('');
}

async function toggleActive(id) {
  const res = await API.toggleUserActive(id);
  if (res && res.ok) load();
}

async function createUser() {
  const sp = document.getElementById('createSpinner');
  const msgEl = document.getElementById('userFormMsg');
  sp.classList.remove('d-none');

  const res = await API.register({
    firstName: document.getElementById('uFirstName').value,
    lastName: document.getElementById('uLastName').value,
    email: document.getElementById('uEmail').value,
    phone: document.getElementById('uPhone').value || null,
    role: document.getElementById('uRole').value,
    password: document.getElementById('uPassword').value
  });

  sp.classList.add('d-none');
  if (res && res.ok) {
    createModal.hide();
    document.getElementById('createUserForm').reset();
    load();
  } else {
    msgEl.className = 'alert alert-danger';
    msgEl.textContent = (res && res.data && res.data.message) || 'Failed to create user.';
    msgEl.classList.remove('d-none');
  }
}

function gotoPage(n) { page = n; load(); }
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { page = 0; load(); }, 300);
});
document.getElementById('roleFilter').addEventListener('change', () => { page = 0; load(); });

// NIDA auto-populate in create user modal
let uNidTimer;
document.getElementById('uNationalId').addEventListener('input', function() {
  clearTimeout(uNidTimer);
  const digits = this.value.replace(/\D/g, '');
  const msgEl = document.getElementById('uNidMsg');
  const okEl  = document.getElementById('uNidOk');
  const spEl  = document.getElementById('uNidSpinner');
  okEl.classList.add('d-none');
  if (digits.length !== 16) return;
  uNidTimer = setTimeout(async () => {
    spEl.style.display = '';
    try {
      const res = await fetch('/api/auth/verify-nid/' + digits);
      const json = await res.json();
      const d = json.data || {};
      if (d.foreName || d.surnames) {
        document.getElementById('uFirstName').value = d.surnames  || '';
        document.getElementById('uLastName').value  = d.foreName  || '';
        okEl.classList.remove('d-none');
        msgEl.className = 'text-success small';
        msgEl.textContent = 'Auto-filled from NIDA ✓';
      } else {
        msgEl.className = 'text-warning small';
        msgEl.textContent = d.error || 'NID not found';
      }
    } catch { msgEl.className = 'text-danger small'; msgEl.textContent = 'NIDA unavailable'; }
    finally { spEl.style.display = 'none'; }
  }, 600);
});

load();
</script>
<script>document.querySelectorAll('.footer-year').forEach(function(el){el.textContent=new Date().getFullYear();});</script>
</body>
</html>
