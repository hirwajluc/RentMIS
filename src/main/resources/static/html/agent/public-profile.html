<!doctype html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title id="page-title">Agent Profile — RentMIS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg"/><link rel="alternate icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/vendor/fonts/iconify-icons.css"/>
  <link rel="stylesheet" href="/assets/vendor/css/core.css"/>
  <link rel="stylesheet" href="/assets/css/demo.css"/>
  <script src="/assets/vendor/js/helpers.js"></script>
  <script src="/assets/js/config.js"></script>
  <style>
    body { background: #f5f5f9; font-family: 'Public Sans', sans-serif; }
    .profile-wrap { max-width: 520px; margin: 24px auto; padding: 0 16px 40px; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
    .card-profile { border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .profile-banner { height: 110px; background: linear-gradient(135deg, #246691 0%, #1a4d6e 100%); position: relative; }
    .avatar-wrap { position: absolute; bottom: -48px; left: 50%; transform: translateX(-50%); }
    .avatar-img {
      width: 96px; height: 96px; border-radius: 50%;
      border: 4px solid #fff; object-fit: cover;
      background: #e3f0f7; display: block;
    }
    .avatar-placeholder {
      width: 96px; height: 96px; border-radius: 50%;
      border: 4px solid #fff; background: #246691;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 700; color: #fff;
    }
    .profile-body { padding: 64px 28px 28px; text-align: center; }
    .agent-name { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin: 0 0 4px; }
    .verified-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8f5e9; color: #2e7d32; border-radius: 20px;
      padding: 2px 10px; font-size: .78rem; font-weight: 600; margin-bottom: 12px;
    }
    .unverified-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #fff8e1; color: #f57f17; border-radius: 20px;
      padding: 2px 10px; font-size: .78rem; font-weight: 600; margin-bottom: 12px;
    }
    .stats-row { display: flex; justify-content: center; gap: 24px; margin: 20px 0; }
    .stat-item { text-align: center; }
    .stat-val { font-size: 1.6rem; font-weight: 700; color: #246691; line-height: 1; }
    .stat-lbl { font-size: .74rem; color: #7a7a9a; margin-top: 2px; }
    .divider { border: none; border-top: 1px solid #eaeaea; margin: 20px 0; }
    .info-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: .9rem; color: #555; }
    .info-row i { font-size: 1.1rem; color: #246691; }
    .nida-note { background: #f0f6fa; border-left: 3px solid #246691; border-radius: 4px;
                 padding: 10px 14px; font-size: .78rem; color: #555; margin-top: 16px; text-align: left; }
    .btn-contact { display: inline-flex; align-items: center; gap-6px; width: 100%;
                   justify-content: center; margin-top: 20px; }
    .skeleton { background: linear-gradient(90deg,#e0e0e0 25%,#f5f5f5 50%,#e0e0e0 75%);
                background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div class="profile-wrap">

  <!-- Brand header -->
  <div class="brand">
    <svg width="270" height="51" viewBox="0 0 360 68" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="rmL2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0D2B55"/><stop offset="100%" stop-color="#122F5E"/>
      </linearGradient></defs>
      <rect x="0" y="2" width="56" height="56" rx="12" fill="url(#rmL2)"/>
      <polygon points="28,9 10,23 46,23" fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/>
      <rect x="14" y="23" width="28" height="20" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
      <rect x="21" y="31" width="10" height="12" rx="2" fill="#2A9D5C"/>
      <text font-family="Arial,Helvetica,sans-serif" font-weight="700" fill="#0D2B55"
            letter-spacing="0.04em" x="68" y="33" font-size="23">RentMIS</text>
      <text font-family="Arial,Helvetica,sans-serif" font-weight="400" fill="#4A6A8A"
            letter-spacing="0.14em" x="69" y="51" font-size="9">RENT MANAGEMENT SYSTEM</text>
      <rect x="69" y="56" width="280" height="1.2" rx="1" fill="#C8A84B" opacity="0.7"/>
    </svg>
  </div>

  <!-- Error state -->
  <div id="errorState" class="d-none text-center py-5">
    <i class="ti tabler-user-x" style="font-size:3rem;color:#ccc;display:block;margin-bottom:12px"></i>
    <p class="text-muted">Agent profile not found or unavailable.</p>
    <a href="/login" class="btn btn-outline-primary btn-sm">Go to RentMIS</a>
  </div>

  <!-- Profile card (hidden until loaded) -->
  <div id="profileCard" class="card-profile d-none">
    <div class="profile-banner">
      <div class="avatar-wrap" id="avatarWrap">
        <!-- filled by JS -->
      </div>
    </div>
    <div class="profile-body">
      <h1 class="agent-name" id="agentName">–</h1>
      <div id="verifiedBadge"></div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val" id="statSigned">–</div>
          <div class="stat-lbl">Successful Placements</div>
        </div>
      </div>

      <hr class="divider"/>

      <div id="phoneRow" class="info-row d-none">
        <i class="ti tabler-phone"></i>
        <span id="agentPhone">–</span>
      </div>

      <div class="info-row">
        <i class="ti tabler-calendar"></i>
        <span>Member since <strong id="joinedAt">–</strong></span>
      </div>

      <div class="nida-note" id="nidaNote">
        <i class="ti tabler-shield-check me-1" style="color:#246691"></i>
        <strong>Identity Verified</strong> — This agent's photo and name have been verified against the Rwanda National ID Authority (NIDA).
      </div>

      <a id="btnContact" href="#" class="btn btn-primary w-100 mt-4 d-none">
        <i class="ti tabler-phone me-2"></i>Contact Agent
      </a>
    </div>
  </div>

  <!-- Loading skeleton -->
  <div id="loadingState" class="card-profile">
    <div class="profile-banner" style="background:#e0e0e0">
      <div class="avatar-wrap">
        <div style="width:96px;height:96px;border-radius:50%;border:4px solid #fff;background:#ccc"></div>
      </div>
    </div>
    <div class="profile-body">
      <div class="skeleton mb-2" style="height:22px;width:55%;margin:0 auto"></div>
      <div class="skeleton mb-4" style="height:16px;width:30%;margin:0 auto"></div>
      <div class="stats-row">
        <div class="stat-item"><div class="skeleton" style="height:30px;width:50px;margin:0 auto"></div><div class="skeleton mt-1" style="height:12px;width:100px"></div></div>
      </div>
    </div>
  </div>

  <p class="text-center text-muted small mt-3">
    <a href="/login" style="color:#246691">Sign in to RentMIS</a> &nbsp;·&nbsp;
    <a href="/register" style="color:#246691">Create account</a>
  </p>
</div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }

  try {
    const res = await fetch('/api/agent/' + id + '/public-profile');
    const json = await res.json();
    if (!res.ok || !json.data) { showError(); return; }
    render(json.data);
  } catch (e) { showError(); }

  function render(d) {
    document.getElementById('loadingState').classList.add('d-none');
    document.getElementById('profileCard').classList.remove('d-none');

    document.title = (d.fullName || 'Agent') + ' — RentMIS Agent Profile';
    document.getElementById('agentName').textContent = d.fullName || '–';
    document.getElementById('statSigned').textContent = d.signedContracts ?? 0;

    // Avatar
    const avatarWrap = document.getElementById('avatarWrap');
    if (d.profileImage) {
      const src = d.profileImage.startsWith('data:')
        ? d.profileImage
        : 'data:image/jpeg;base64,' + d.profileImage;
      avatarWrap.innerHTML = `<img src="${src}" class="avatar-img" alt="${d.fullName}" onerror="this.replaceWith(initials('${(d.fullName||'?')[0]}'))"/>`;
    } else {
      avatarWrap.innerHTML = `<div class="avatar-placeholder">${(d.fullName||'?')[0].toUpperCase()}</div>`;
    }

    // Verified badge
    const badgeEl = document.getElementById('verifiedBadge');
    if (d.isVerified) {
      badgeEl.innerHTML = `<span class="verified-badge"><i class="ti tabler-rosette-discount-check"></i> NIDA Verified</span>`;
    } else {
      badgeEl.innerHTML = `<span class="unverified-badge"><i class="ti tabler-clock"></i> Pending Verification</span>`;
      document.getElementById('nidaNote').innerHTML =
        '<i class="ti tabler-info-circle me-1" style="color:#f57f17"></i>' +
        'This agent has not yet been verified against NIDA. Photo verification occurs automatically upon registration.';
      document.getElementById('nidaNote').style.borderColor = '#f9a825';
      document.getElementById('nidaNote').style.background = '#fffde7';
    }

    // Phone
    if (d.phone) {
      document.getElementById('agentPhone').textContent = d.phone;
      document.getElementById('phoneRow').classList.remove('d-none');
      document.getElementById('btnContact').href = 'tel:' + d.phone.replace(/\s/g, '');
      document.getElementById('btnContact').classList.remove('d-none');
    }

    // Joined date
    if (d.joinedAt) {
      document.getElementById('joinedAt').textContent =
        new Date(d.joinedAt).toLocaleDateString('en-RW', { year:'numeric', month:'long' });
    }
  }

  function initials(letter) {
    const div = document.createElement('div');
    div.className = 'avatar-placeholder';
    div.textContent = letter.toUpperCase();
    return div;
  }

  function showError() {
    document.getElementById('loadingState').classList.add('d-none');
    document.getElementById('errorState').classList.remove('d-none');
  }
})();
</script>

</body>
</html>
