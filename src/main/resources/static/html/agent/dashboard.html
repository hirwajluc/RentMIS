<!doctype html>
<html lang="en" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
      data-skin="default" data-bs-theme="light" data-assets-path="/assets/" data-template="vertical-menu-template-no-customizer">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title id="page-title">Agent Dashboard — RentMIS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg"/><link rel="alternate icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/vendor/fonts/iconify-icons.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/node-waves/node-waves.css"/>
  <link rel="stylesheet" href="/assets/vendor/css/core.css"/>
  <link rel="stylesheet" href="/assets/css/demo.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/apex-charts/apex-charts.css"/>
  <script src="/assets/vendor/js/helpers.js"></script>
  <script src="/assets/js/config.js"></script>
</head>
<body>
<div class="layout-wrapper layout-content-navbar">
  <div class="layout-container">
    <div id="rentmis-sidebar"></div>
    <div class="layout-page">
      <div id="rentmis-navbar"></div>
      <div class="content-wrapper">
        <div class="container-xxl flex-grow-1 container-p-y">

          <div class="d-flex align-items-center justify-content-between mb-6">
            <div>
              <h4 class="mb-1">Agent Dashboard</h4>
              <p class="text-muted mb-0">Your brokerage activity overview</p>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" onclick="copyProfileLink()" title="Share your public profile">
                <i class="ti tabler-share me-1"></i>Share Profile
              </button>
              <a href="/html/agent/properties.html" class="btn btn-primary">
                <i class="ti tabler-building-community me-2"></i>Browse Vacant Properties
              </a>
            </div>
          </div>

          <!-- KPI Cards -->
          <div class="row g-4 mb-6" id="kpiRow">
            <!-- injected by JS -->
            <div class="col-12 text-center py-4"><div class="spinner-border text-primary"></div></div>
          </div>

          <!-- Linkage status breakdown -->
          <div class="row g-4">
            <div class="col-md-7">
              <div class="card h-100">
                <div class="card-header d-flex align-items-center justify-content-between">
                  <h5 class="mb-0">Recent Linkages</h5>
                  <a href="/html/agent/linkages.html" class="btn btn-sm btn-outline-primary">View All</a>
                </div>
                <div class="card-body p-0">
                  <table class="table table-hover mb-0">
                    <thead><tr>
                      <th>ID</th><th>Property</th><th>Unit</th><th>Date</th><th>Status</th><th>Commission</th>
                    </tr></thead>
                    <tbody id="recentLinkages">
                      <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="col-md-5">
              <div class="card h-100">
                <div class="card-header"><h5 class="mb-0">Linkage Status</h5></div>
                <div class="card-body">
                  <div id="linkageChartWrap">
                    <div id="linkageChart"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
        <footer class="content-footer footer bg-footer-theme">
          <div class="container-xxl">
            <div class="footer-container d-flex align-items-center justify-content-center py-3">
              <p class="footer-text mb-0 text-muted small">Copyright &copy; <span class="footer-year"></span> <strong>Good Link Solutions</strong>. All rights reserved.</p>
            </div>
          </div>
        </footer>
        <div class="content-backdrop fade"></div>
      </div>
    </div>
  </div>
  <div class="layout-overlay layout-menu-toggle"></div>
</div>

<script src="/assets/vendor/libs/jquery/jquery.js"></script>
<script src="/assets/vendor/libs/popper/popper.js"></script>
<script src="/assets/vendor/js/bootstrap.js"></script>
<script src="/assets/vendor/libs/node-waves/node-waves.js"></script>
<script src="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
<script src="/assets/vendor/js/menu.js"></script>
<script src="/assets/vendor/libs/apex-charts/apexcharts.js"></script>
<script src="/assets/js/main.js"></script>
  <script src="/static/js/i18n.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
const statusColor = { PENDING:'warning', ACCEPTED:'info', REJECTED:'danger', CONTRACT_SIGNED:'success', EXPIRED:'secondary' };
const commColor   = { PENDING:'warning', APPROVED:'info', PAID:'success' };

function kpiCard(label, value, icon, color) {
  return `<div class="col-6 col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="avatar flex-shrink-0">
          <span class="avatar-initial rounded bg-label-${color}"><i class="ti ${icon} icon-md"></i></span>
        </div>
        <div>
          <div class="fs-3 fw-bold">${value}</div>
          <div class="text-muted small">${label}</div>
        </div>
      </div>
    </div>
  </div>`;
}

async function loadDashboard() {
  const res = await request('GET', '/agent/dashboard');
  if (!res || !res.ok) return;
  const d = res.data.data;

  document.getElementById('kpiRow').innerHTML = [
    kpiCard('Total Linkages',   d.totalLinkages,          'tabler-link',          'primary'),
    kpiCard('Pending',          d.pendingLinkages,        'tabler-clock',         'warning'),
    kpiCard('Contracts Signed', d.contractSignedLinkages, 'tabler-circle-check',  'success'),
    kpiCard('Commissions',      d.totalCommissions,       'tabler-coin',          'info'),
  ].join('');

  // Donut chart
  const labels = ['Pending','Accepted','Rejected','Signed','Expired'];
  const series = [d.pendingLinkages, d.acceptedLinkages, d.rejectedLinkages,
                  d.contractSignedLinkages, d.expiredLinkages];
  const total  = series.reduce((a,b) => a+b, 0);

  if (total > 0) {
    new ApexCharts(document.getElementById('linkageChart'), {
      chart:  { type: 'donut', height: 260 },
      series: series,
      labels: labels,
      colors: ['#ffab00','#00bad1','#ff3e1d','#71dd37','#a8aaae'],
      legend: { position: 'bottom' },
      plotOptions: { pie: { donut: { labels: { show: true,
        total: { show: true, label: 'Total', formatter: () => total } } } } },
      dataLabels: { enabled: false }
    }).render();
  } else {
    document.getElementById('linkageChartWrap').innerHTML =
      '<p class="text-muted text-center py-5">No linkages yet</p>';
  }
}

async function loadRecentLinkages() {
  const res = await request('GET', '/agent/linkages?size=8&sort=createdAt,desc');
  const tbody = document.getElementById('recentLinkages');
  if (!res || !res.ok || !res.data.data || res.data.data.content.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No linkages yet. <a href="/html/agent/properties.html">Browse properties</a> to create your first linkage.</td></tr>';
    return;
  }
  tbody.innerHTML = res.data.data.content.map(l => `
    <tr>
      <td><small class="text-muted">#${l.id}</small></td>
      <td><small>${l.propertyRef || '–'}</small></td>
      <td><small>${l.unitRef || '–'}</small></td>
      <td><small>${l.createdAt ? new Date(l.createdAt).toLocaleDateString() : '–'}</small></td>
      <td><span class="badge bg-label-${statusColor[l.status]||'secondary'}">${l.status}</span></td>
      <td>${l.commissionStatus
            ? `<span class="badge bg-label-${commColor[l.commissionStatus]||'secondary'}">${l.commissionStatus}</span>`
            : '<span class="text-muted small">–</span>'}</td>
    </tr>`).join('');
}

function copyProfileLink() {
  const user = Auth.getUser();
  const url = window.location.origin + '/html/agent/public-profile.html?id=' + user.id;
  const btn = document.querySelector('[onclick="copyProfileLink()"]');
  const orig = btn.innerHTML;

  function onCopied() {
    btn.innerHTML = '<i class="ti tabler-check me-1"></i>Copied!';
    btn.classList.replace('btn-outline-secondary', 'btn-outline-success');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.replace('btn-outline-success', 'btn-outline-secondary'); }, 2500);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(onCopied).catch(() => fallbackCopy(url, onCopied));
  } else {
    fallbackCopy(url, onCopied);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); onSuccess(); }
  catch { prompt('Copy your profile link:', text); }
  document.body.removeChild(ta);
}

loadDashboard();
loadRecentLinkages();
</script>
<script>document.querySelectorAll('.footer-year').forEach(e => e.textContent = new Date().getFullYear());</script>
</body>
</html>
