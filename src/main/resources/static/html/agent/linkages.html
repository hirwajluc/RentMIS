<!doctype html>
<html lang="en" class="layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
      data-skin="default" data-bs-theme="light" data-assets-path="/assets/" data-template="vertical-menu-template-no-customizer">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title id="page-title">My Linkages — RentMIS</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg"/><link rel="alternate icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/vendor/fonts/iconify-icons.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/node-waves/node-waves.css"/>
  <link rel="stylesheet" href="/assets/vendor/css/core.css"/>
  <link rel="stylesheet" href="/assets/css/demo.css"/>
  <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css"/>
  <script src="/assets/vendor/js/helpers.js"></script>
  <script src="/assets/js/config.js"></script>
</head>
<body>
<div class="layout-wrapper layout-content-navbar">
  <div class="layout-container">
    <div id="rentmis-sidebar"></div>
    <div class="layout-page">
      <div id="rentmis-navbar"></div>
      <div class="content-wrapper">
        <div class="container-xxl flex-grow-1 container-p-y">

          <div class="d-flex align-items-center justify-content-between mb-6">
            <div>
              <h4 class="mb-1">My Linkages</h4>
              <p class="text-muted mb-0">History of all brokerage linkages you have submitted</p>
            </div>
            <a href="/html/agent/properties.html" class="btn btn-primary">
              <i class="ti tabler-plus me-2"></i>New Linkage
            </a>
          </div>

          <!-- Filter -->
          <div class="card mb-4">
            <div class="card-body py-3">
              <div class="row g-3 align-items-end">
                <div class="col-md-4">
                  <label class="form-label mb-1 small">Filter by Status</label>
                  <select class="form-select" id="statusFilter" onchange="page=0;loadLinkages()">
                    <option value="">All Statuses</option>
                    <option>PENDING</option><option>ACCEPTED</option>
                    <option>REJECTED</option><option>CONTRACT_SIGNED</option><option>EXPIRED</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-datatable table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Property Reference</th>
                    <th>Unit</th>
                    <th>Lead Name</th>
                    <th>Lead Phone</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                    <th>Commission</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="linkagesBody">
                  <tr><td colspan="9" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                </tbody>
              </table>
            </div>
            <div class="card-footer d-flex justify-content-between align-items-center">
              <small class="text-muted" id="tableInfo"></small>
              <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
            </div>
          </div>

        </div>
        <footer class="content-footer footer bg-footer-theme">
          <div class="container-xxl">
            <div class="footer-container d-flex align-items-center justify-content-center py-3">
              <p class="footer-text mb-0 text-muted small">Copyright &copy; <span class="footer-year"></span> <strong>Good Link Solutions</strong>. All rights reserved.</p>
            </div>
          </div>
        </footer>
        <div class="content-backdrop fade"></div>
      </div>
    </div>
  </div>
  <div class="layout-overlay layout-menu-toggle"></div>
</div>

<!-- Detail Modal (read-only, shows ONLY agent-safe fields) -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Linkage Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="/assets/vendor/libs/jquery/jquery.js"></script>
<script src="/assets/vendor/libs/popper/popper.js"></script>
<script src="/assets/vendor/js/bootstrap.js"></script>
<script src="/assets/vendor/libs/node-waves/node-waves.js"></script>
<script src="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
<script src="/assets/vendor/js/menu.js"></script>
<script src="/assets/js/main.js"></script>
  <script src="/static/js/i18n.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
let page = 0;
const statusColor = { PENDING:'warning', ACCEPTED:'info', REJECTED:'danger', CONTRACT_SIGNED:'success', EXPIRED:'secondary' };
const commColor   = { PENDING:'warning', APPROVED:'info', PAID:'success' };
const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

async function loadLinkages() {
  const status = document.getElementById('statusFilter').value;
  const params = { page, size: 20, sort: 'createdAt,desc' };
  const res = await request('GET', '/agent/linkages?' + new URLSearchParams(params));
  const tbody = document.getElementById('linkagesBody');
  if (!res || !res.ok || !res.data.data || res.data.data.content.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-4 text-muted">No linkages found. <a href="/html/agent/properties.html">Browse properties</a> to create one.</td></tr>';
    document.getElementById('tableInfo').textContent = '0 results';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  let rows = res.data.data.content;
  if (status) rows = rows.filter(l => l.status === status);
  const p = res.data.data;

  tbody.innerHTML = rows.map(l => `
    <tr>
      <td><small class="text-muted">#${l.id}</small></td>
      <td>
        <span class="fw-semibold small">${l.propertyRef || '–'}</span>
      </td>
      <td><small>${l.unitRef || '<span class="text-muted">General</span>'}</small></td>
      <td>${l.tenantLeadName}</td>
      <td><small>${l.tenantLeadPhone}</small></td>
      <td><small>${l.createdAt ? new Date(l.createdAt).toLocaleDateString() : '–'}</small></td>
      <td><span class="badge bg-label-${statusColor[l.status]||'secondary'}">${l.status}</span></td>
      <td>
        ${l.commissionStatus
          ? `<span class="badge bg-label-${commColor[l.commissionStatus]||'secondary'}">${l.commissionStatus}</span>`
          : '<span class="text-muted small">–</span>'}
      </td>
      <td>
        <button class="btn btn-sm btn-icon btn-outline-primary" onclick="showDetail(${JSON.stringify(l).replace(/"/g,'&quot;')})" title="Detail">
          <i class="ti tabler-eye"></i>
        </button>
      </td>
    </tr>`).join('');

  document.getElementById('tableInfo').textContent = `${p.totalElements} linkage(s)`;
  document.getElementById('pagination').innerHTML = Array.from({length: p.totalPages}, (_,i) =>
    `<li class="page-item${i===p.number?' active':''}">
       <a class="page-link" href="javascript:void(0)" onclick="gotoPage(${i})">${i+1}</a>
     </li>`).join('');
}

function gotoPage(n) { page = n; loadLinkages(); }

function showDetail(l) {
  document.getElementById('detailBody').innerHTML = `
    <dl class="row mb-0">
      <dt class="col-sm-5">Linkage ID</dt>
      <dd class="col-sm-7">#${l.id}</dd>

      <dt class="col-sm-5">Property Reference</dt>
      <dd class="col-sm-7">${l.propertyRef || '–'}</dd>

      <dt class="col-sm-5">Unit</dt>
      <dd class="col-sm-7">${l.unitRef || '<span class="text-muted">General lead (no specific unit)</span>'}</dd>

      <dt class="col-sm-5">Date Created</dt>
      <dd class="col-sm-7">${l.createdAt ? new Date(l.createdAt).toLocaleString() : '–'}</dd>

      <dt class="col-sm-5">Status</dt>
      <dd class="col-sm-7"><span class="badge bg-label-${statusColor[l.status]||'secondary'}">${l.status}</span></dd>

      <dt class="col-sm-5">Commission Status</dt>
      <dd class="col-sm-7">
        ${l.commissionStatus
          ? `<span class="badge bg-label-${commColor[l.commissionStatus]||'secondary'}">${l.commissionStatus}</span>`
          : '<span class="text-muted">Not yet created</span>'}
      </dd>

      <dt class="col-sm-5">Lead Name</dt>
      <dd class="col-sm-7">${l.tenantLeadName}</dd>

      <dt class="col-sm-5">Lead Phone</dt>
      <dd class="col-sm-7">${l.tenantLeadPhone}</dd>

      ${l.notes ? `<dt class="col-sm-5">Notes</dt><dd class="col-sm-7">${l.notes}</dd>` : ''}
      ${l.reviewedNotes ? `<dt class="col-sm-5">Admin Feedback</dt><dd class="col-sm-7">${l.reviewedNotes}</dd>` : ''}
    </dl>
    <div class="alert alert-light border mt-3 mb-0 py-2 px-3 small">
      <i class="ti tabler-shield-lock me-1 text-muted"></i>
      Tenant identity, landlord identity, and contract details are not accessible through this system.
    </div>`;
  detailModal.show();
}

loadLinkages();
</script>
<script>document.querySelectorAll('.footer-year').forEach(e => e.textContent = new Date().getFullYear());</script>
</body>
</html>
